# ─────────────────────────────────────────────────────────────────────────────
# TVS AutoSequencing — Playwright Framework Configuration
# Override any value at runtime: mvn test -Dbase.url=https://...
# ─────────────────────────────────────────────────────────────────────────────

# Application URLs
base.url=https://uat-sns.tvsmotor.net/Autoseq/login
groupmaster.url=https://uat-sns.tvsmotor.net/Autoseq/groupmaster
knowledgegraph.url=https://uat-eyeq.tvsmotor.net/knowledgegraph2.0

# Manual Sequencing (QAS)
manualseq.base.url=https://tvsmsrvrqas.tvsmotor.net/SequencePlanTest/login
manualseq.groupmaster.url=https://tvsmsrvrqas.tvsmotor.net/SequencePlanTest/groupmaster

# Browser: chromium | firefox | webkit
browser=chromium

# Run headless: true | false
headless=false

# Global timeout in milliseconds
default.timeout.ms=30000

# Credentials (prefer environment variables in CI: APP_USERNAME / APP_PASSWORD)
app.username=d.sureshbabu@tvsmotor.com
app.password=Ramesh@1983

# Report output directories
report.dir=reports
screenshot.dir=reports/screenshots

# ─────────────────────────────────────────────────────────────────────────────
# Confluence Integration
# Set confluence.enabled=true and fill in your details to publish results.
# Token: generate at https://<your-domain>.atlassian.net/id/manage-profile/security/api-tokens
# ─────────────────────────────────────────────────────────────────────────────
confluence.enabled=false
confluence.base.url=https://your-domain.atlassian.net/wiki
confluence.space.key=QA
confluence.page.title=TVS AutoSeq — Playwright Test Results
confluence.parent.page.id=
confluence.username=your-email@tvsmotor.com
confluence.api.token=your-api-token-here

# ─────────────────────────────────────────────────────────────────────────────
# Email Reporter
# Set email.enabled=true to send results after every suite run.
# For Gmail: use an App Password (not your account password).
# For corporate SMTP: set email.smtp.host to your mail server.
# ─────────────────────────────────────────────────────────────────────────────
email.enabled=true
# ── TVS Corporate SMTP (Office 365) ──────────────────────────────────────────
# Office 365 SMTP works with your regular corporate credentials.
# If using Gmail, generate an App Password at:
#   https://myaccount.google.com/apppasswords
# ─────────────────────────────────────────────────────────────────────────────
email.smtp.host=smtp.office365.com
email.smtp.port=587
email.smtp.auth=true
email.smtp.starttls=true
email.from=d.sureshbabu@tvsmotor.com
email.to=d.sureshbabu@tvsmotor.com
email.username=d.sureshbabu@tvsmotor.com
# Your TVS corporate email password (or App Password for Gmail)
email.password=Ramesh@1983
